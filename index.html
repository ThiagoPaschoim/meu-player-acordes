<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player de Acordes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #282c34;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            margin: 0;
        }
        .container {
            background: #3a3f4b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        textarea {
            width: 90%;
            height: 80px;
            padding: 15px;
            margin-bottom: 20px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            resize: none;
            text-transform: uppercase;
        }
        button {
            background-color: #61dafb;
            color: #282c34;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:hover { background-color: #4fa8c7; }
        button:active { transform: scale(0.98); }
        .instrucoes { margin-top: 20px; font-size: 14px; color: #abb2bf; }
        #status { margin-top: 15px; font-size: 24px; font-weight: bold; color: #98c379; min-height: 30px;}
    </style>
</head>
<body>

<div class="container">
    <h2>🎵 Tocador de Acordes</h2>
    
    <textarea id="chord-input" placeholder="Ex: C G Am F"></textarea>
    
    <button onclick="tocarAcordes()">Tocar Sequência</button>
    
    <div id="status"></div>

    <div class="instrucoes">
        Digite os acordes separados por espaço. <br>
        Suportados neste exemplo: C, Cm, D, Dm, E, Em, F, Fm, G, Gm, A, Am, B, Bm.
    </div>
</div>

<script>
    // Configura o Sintetizador Polifônico (capaz de tocar várias notas juntas)
    // O volume é reduzido para não assustar o usuário (-10 decibéis)
    const synth = new Tone.PolySynth(Tone.Synth, {
        volume: -10,
        oscillator: { type: "triangle" } // Um som de sintetizador suave
    }).toDestination();

    // Dicionário de Acordes (Mapeando cifras para notas reais na 4ª oitava)
    const DICIONARIO_ACORDES = {
        'C':  ['C4', 'E4', 'G4'],
        'CM': ['C4', 'Eb4', 'G4'], // Mínusculo 'm' é convertido para 'M' pelo CSS/toUpperCase
        'D':  ['D4', 'F#4', 'A4'],
        'DM': ['D4', 'F4', 'A4'],
        'E':  ['E4', 'G#4', 'B4'],
        'EM': ['E4', 'G4', 'B4'],
        'F':  ['F4', 'A4', 'C5'],
        'FM': ['F4', 'Ab4', 'C5'],
        'G':  ['G4', 'B4', 'D5'],
        'GM': ['G4', 'Bb4', 'D5'],
        'A':  ['A4', 'C#5', 'E5'],
        'AM': ['A4', 'C5', 'E5'],
        'B':  ['B4', 'D#5', 'F#5'],
        'BM': ['B4', 'D5', 'F#5']
    };

    async function tocarAcordes() {
        // Obrigatório pelos navegadores modernos: o áudio só liga após interação do usuário
        await Tone.start();
        
        const inputStr = document.getElementById('chord-input').value.trim().toUpperCase();
        const statusDiv = document.getElementById('status');
        
        if (!inputStr) {
            statusDiv.innerText = "Digite alguns acordes!";
            statusDiv.style.color = "#e06c75"; // Vermelho
            return;
        }

        // Divide o texto pelos espaços ("C G" vira ["C", "G"])
        const arrayAcordes = inputStr.split(/\s+/);
        
        statusDiv.style.color = "#98c379"; // Verde

        // Tempo atual do relógio interno do áudio
        let tempoAtual = Tone.now();
        const duracaoAcorde = 1; // 1 segundo por acorde

        // Agenda cada acorde na linha do tempo
        arrayAcordes.forEach((cifra) => {
            const notas = DICIONARIO_ACORDES[cifra];
            
            if (notas) {
                // Diz ao sintetizador: "Toque essas notas, com essa duração, começando neste tempo exato"
                synth.triggerAttackRelease(notas, duracaoAcorde - 0.1, tempoAtual);
                
                // Atualiza o texto na tela no momento exato em que o acorde toca
                Tone.Draw.schedule(function(){
                    statusDiv.innerText = cifra;
                }, tempoAtual);

                // Avança o relógio para o próximo acorde
                tempoAtual += duracaoAcorde;
            } else {
                console.warn("Acorde não encontrado no dicionário:", cifra);
            }
        });

        // Limpa a tela após a sequência terminar
        Tone.Draw.schedule(function(){
            statusDiv.innerText = "Fim 🏁";
            setTimeout(() => { statusDiv.innerText = ""; }, 2000);
        }, tempoAtual);
    }
</script>

</body>
</html>
