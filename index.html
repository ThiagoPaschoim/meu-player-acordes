<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJazzLab Pessoal - Sequenciador</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonaljs/tonal/browser/tonal.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            background: #252526;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 850px;
        }
        .painel-controle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333333;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .painel-controle label { font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .painel-controle input[type="number"] {
            width: 60px; padding: 5px; border-radius: 4px; border: none; font-weight: bold; text-align: center;
        }
        .botoes-play button, .btn-add {
            padding: 10px 20px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer;
        }
        .botoes-play button { margin-left: 10px; }
        .btn-tocar { background-color: #4CAF50; color: white; }
        .btn-parar { background-color: #f44336; color: white; }
        .btn-add { background-color: #007acc; color: white; margin-top: 15px; width: 100%; }
        
        .grade-compassos {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .compasso {
            background: #1e1e1e;
            border: 2px solid #555;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            gap: 5px;
            width: calc(50% - 7.5px);
            box-sizing: border-box;
            position: relative;
            margin-top: 10px;
        }
        .compasso-label {
            position: absolute; top: -12px; left: 10px; background: #252526; padding: 0 5px; font-size: 12px; font-weight: bold; color: #888;
        }
        .tempo {
            flex: 1; display: flex; flex-direction: column; gap: 5px;
        }
        .tempo input[type="text"] {
            width: 100%; padding: 8px 0; text-align: center; font-weight: bold; font-size: 15px; border: 1px solid #444; background: #3c3c3c; color: #fff; border-radius: 4px; box-sizing: border-box;
        }
        .tempo select {
            width: 100%; padding: 4px 0; text-align: center; font-size: 12px; background: #2d2d2d; color: #aaa; border: 1px solid #444; border-radius: 4px; cursor: pointer;
        }
        .tocando { border-color: #4CAF50 !important; background: #2e4a2e !important; }
        .erro-acorde { border-color: #f44336 !important; background: #4a2e2e !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="painel-controle">
        <div style="display: flex; gap: 20px;">
            <label>BPM: <input type="number" id="bpm-input" value="100"></label>
            <label><input type="checkbox" id="metro-toggle"> Metrônomo</label>
            <label><input type="checkbox" id="loop-toggle"> Loop</label>
        </div>
        <div class="botoes-play">
            <button class="btn-tocar" onclick="tocarSequencia()">▶ Tocar</button>
            <button class="btn-parar" onclick="pararSequencia()">⏹ Parar</button>
        </div>
    </div>

    <div class="grade-compassos" id="grade">
        </div>
    
    <button class="btn-add" onclick="adicionarCompasso()">➕ Adicionar Compasso</button>
</div>

<script>
    // --- MOTORES DE ÁUDIO ---
    const synth = new Tone.PolySynth(Tone.Synth, {
        volume: -8,
        oscillator: { type: "triangle" },
        envelope: { attack: 0.05, decay: 0.2, sustain: 0.8, release: 1 }
    }).toDestination();

    const metronomoSynth = new Tone.MembraneSynth({ volume: -15 }).toDestination();

    // --- CONTROLE DE COMPASSOS ---
    const gradeDiv = document.getElementById('grade');
    let totalCompassos = 0;

    function criarCompasso() {
        const i = totalCompassos;
        const compassoDiv = document.createElement('div');
        compassoDiv.className = 'compasso';
        compassoDiv.innerHTML = `<span class="compasso-label">${i + 1}</span>`;
        
        for (let j = 0; j < 4; j++) {
            const beatId = `beat-${i}-${j}`; 
            compassoDiv.innerHTML += `
                <div class="tempo">
                    <input type="text" id="input-${beatId}" placeholder="-">
                    <select id="octave-${beatId}">
                        <option value="2">2</option>
                        <option value="3" selected>3</option> <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </div>
            `;
        }
        gradeDiv.appendChild(compassoDiv);
        totalCompassos++;
    }

    function adicionarCompasso() {
        criarCompasso();
        // Se a música estiver tocando e em loop, atualiza o fim do loop dinamicamente
        Tone.Transport.loopEnd = `${totalCompassos}:0:0`;
    }

    // Inicializa com 4 compassos
    for (let i = 0; i < 4; i++) {
        criarCompasso();
    }

    // Pré-preenche para testar
    document.getElementById('input-beat-0-0').value = 'C';
    document.getElementById('input-beat-0-2').value = 'Am7';
    document.getElementById('input-beat-1-0').value = 'Dm7';
    document.getElementById('input-beat-1-2').value = 'G7';

    // --- LÓGICA DE REPRODUÇÃO E PARSER DE ACORDES ---
    async function tocarSequencia() {
        await Tone.start(); 
        pararSequencia();   

        Tone.Transport.bpm.value = parseInt(document.getElementById('bpm-input').value);

        // Configuração do Loop
        const isLoop = document.getElementById('loop-toggle').checked;
        Tone.Transport.loop = isLoop;
        Tone.Transport.loopStart = 0;
        Tone.Transport.loopEnd = `${totalCompassos}:0:0`;

        let acordeAtual = null;
        let oitavaAtual = 3; // Oitava padrão

        for (let i = 0; i < totalCompassos; i++) {
            for (let j = 0; j < 4; j++) {
                const beatId = `beat-${i}-${j}`;
                const inputEl = document.getElementById(`input-${beatId}`);
                const selectEl = document.getElementById(`octave-${beatId}`);
                
                // Pega o valor exatamente como o usuário digitou
                const inputAcorde = inputEl.value.trim();

                if (inputAcorde) {
                    acordeAtual = inputAcorde;
                    oitavaAtual = parseInt(selectEl.value);
                }

                const tempoMusical = `${i}:${j}:0`;

                // Agendamento do Metrônomo
                if (document.getElementById('metro-toggle').checked) {
                    const notaClick = j === 0 ? "C3" : "C2"; 
                    Tone.Transport.schedule((time) => {
                        metronomoSynth.triggerAttackRelease(notaClick, "8n", time);
                    }, tempoMusical);
                }

                // Agendamento dos Acordes
                if (acordeAtual) {
                    // Usa o Tonal.js para extrair a teoria do acorde escrito
                    const chordInfo = Tonal.Chord.get(acordeAtual);
                    
                    let notasReais = [];

                    // Se o Tonal reconhecer o acorde (não for empty)
                    if (!chordInfo.empty) {
                        const raiz = chordInfo.tonic || acordeAtual.charAt(0);
                        const raizComOitava = `${raiz}${oitavaAtual}`;
                        
                        // Mágica: Pega os intervalos (ex: 1P, 3m, 5P) e transpõe a partir da nota raiz na oitava correta
                        notasReais = chordInfo.intervals.map(intervalo => 
                            Tonal.Note.transpose(raizComOitava, intervalo)
                        );
                    }

                    Tone.Transport.schedule((time) => {
                        // Feedback Visual
                        Tone.Draw.schedule(() => {
                            document.querySelectorAll('input[type="text"]').forEach(el => {
                                el.classList.remove('tocando');
                                el.classList.remove('erro-acorde');
                            });
                            
                            if (chordInfo.empty) {
                                inputEl.classList.add('erro-acorde'); // Fica vermelho se a cifra for inválida
                            } else {
                                inputEl.classList.add('tocando');
                            }
                        }, time);

                        // Toca o acorde
                        if (!chordInfo.empty) {
                            synth.triggerAttackRelease(notasReais, "4n", time);
                        }
                    }, tempoMusical);
                }
            }
        }

        // Se não for loop, agenda para parar no final exato do último compasso
        if (!isLoop) {
            Tone.Transport.stop(`${totalCompassos}:0:0`);
        }
        
        Tone.Transport.start();
    }

    function pararSequencia() {
        Tone.Transport.stop();
        Tone.Transport.cancel(0); 
        document.querySelectorAll('input[type="text"]').forEach(el => {
            el.classList.remove('tocando');
            el.classList.remove('erro-acorde');
        });
    }
</script>

</body>
</html>
